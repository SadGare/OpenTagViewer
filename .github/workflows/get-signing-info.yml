name: 获取签名信息 (Get Signing Info)

on:
  workflow_dispatch: # 允许手动触发

jobs:
  get-signing-info:
    name: 生成 SHA1 指纹和包名
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: 赋予 Gradlew 执行权限
        run: chmod +x gradlew
      
      - name: 生成签名报告
        run: |
          echo "======================================"
          echo "正在生成签名报告..."
          echo "======================================"
          ./gradlew signingReport --no-daemon
      
      - name: 提取关键信息
        run: |
          echo ""
          echo "======================================"
          echo "📋 配置 Google Maps API Key 所需信息"
          echo "======================================"
          echo ""
          
          # 提取包名
          PACKAGE_NAME=$(grep 'namespace = ' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "📦 包名 (Package Name):"
          echo "   $PACKAGE_NAME"
          echo ""
          
          # 提取 Debug SHA1
          echo "🔐 Debug SHA1 指纹 (用于开发测试):"
          ./gradlew signingReport --no-daemon 2>/dev/null | grep -A 2 "Variant: debug" | grep "SHA1:" | sed 's/.*SHA1: /   /'
          echo ""
          
          # 提取 Release SHA1 (如果有)
          echo "🔐 Release SHA1 指纹 (用于正式发布):"
          RELEASE_SHA1=$(./gradlew signingReport --no-daemon 2>/dev/null | grep -A 2 "Variant: release" | grep "SHA1:" | sed 's/.*SHA1: /   /')
          if [ -z "$RELEASE_SHA1" ]; then
            echo "   未配置 Release 签名 (使用 Debug 签名即可)"
          else
            echo "$RELEASE_SHA1"
          fi
          echo ""
          
          echo "======================================"
          echo "📝 如何使用这些信息"
          echo "======================================"
          echo ""
          echo "1. Google Maps API Key 配置:"
          echo "   - 包名: $PACKAGE_NAME"
          echo "   - SHA1: 见上方 Debug SHA1 指纹"
          echo ""
          echo "2. 高德地图 API Key 配置:"
          echo "   - 包名: $PACKAGE_NAME"
          echo "   - SHA1: 见上方 Debug SHA1 指纹"
          echo ""
          echo "3. 配置步骤:"
          echo "   a) 将 SHA1 指纹复制到 API 控制台"
          echo "   b) 包名填写: $PACKAGE_NAME"
          echo "   c) 获取 API Key 后填入 secrets.properties"
          echo ""
          echo "======================================"
      
      - name: 生成完整签名报告文件
        run: |
          ./gradlew signingReport --no-daemon > signing-report.txt 2>&1
          echo "完整的签名报告已保存到 signing-report.txt"
      
      - name: 上传签名报告
        uses: actions/upload-artifact@v4
        with:
          name: signing-report
          path: signing-report.txt
          retention-days: 7
      
      - name: 显示完整报告路径
        run: |
          echo ""
          echo "======================================"
          echo "✅ 完成！"
          echo "======================================"
          echo ""
          echo "完整的签名报告已上传为 Artifact，可在 Actions 页面下载。"
          echo ""
          echo "下一步操作："
          echo "1. 复制上方的 SHA1 指纹"
          echo "2. 访问 https://console.cloud.google.com/apis/credentials"
          echo "3. 创建 API 密钥并添加 Android 限制"
          echo "4. 填入包名和 SHA1 指纹"
          echo ""

