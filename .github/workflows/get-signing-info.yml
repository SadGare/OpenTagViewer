name: 获取签名信息 (Get Signing Info)

on:
  workflow_dispatch: # 允许手动触发

jobs:
  get-signing-info:
    name: 生成 SHA1 指纹和包名
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: 赋予 Gradlew 执行权限
        run: chmod +x gradlew
      
      - name: 生成 Debug Keystore
        run: |
          echo "======================================"
          echo "正在生成 Debug Keystore..."
          echo "======================================"
          mkdir -p $HOME/.android
          keytool -genkey -v -keystore $HOME/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "✅ Debug Keystore 已生成"
          echo ""
      
      - name: 生成签名报告
        run: |
          echo "======================================"
          echo "正在生成签名报告..."
          echo "======================================"
          ./gradlew signingReport --no-daemon
      
      - name: 提取关键信息
        run: |
          echo ""
          echo "======================================"
          echo "📋 配置 Google Maps API Key 所需信息"
          echo "======================================"
          echo ""
          
          # 提取包名
          PACKAGE_NAME=$(grep 'namespace = ' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "📦 包名 (Package Name):"
          echo "   $PACKAGE_NAME"
          echo ""
          
          # 使用 keytool 直接读取 Debug SHA1（更可靠）
          echo "🔐 Debug SHA1 指纹 (用于开发测试):"
          DEBUG_SHA1=$(keytool -list -v -keystore $HOME/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep "SHA1:" | sed 's/.*SHA1: //')
          echo "   $DEBUG_SHA1"
          echo ""
          
          # 同时提取 SHA256（某些平台可能需要）
          echo "🔐 Debug SHA256 指纹 (备用):"
          DEBUG_SHA256=$(keytool -list -v -keystore $HOME/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep "SHA256:" | sed 's/.*SHA256: //')
          echo "   $DEBUG_SHA256"
          echo ""
          
          # 提取 Release SHA1 (如果有)
          echo "🔐 Release SHA1 指纹 (用于正式发布):"
          RELEASE_SHA1=$(./gradlew signingReport --no-daemon 2>/dev/null | grep -A 2 "Variant: release" | grep "SHA1:" | sed 's/.*SHA1: /   /')
          if [ -z "$RELEASE_SHA1" ]; then
            echo "   未配置 Release 签名 (使用 Debug 签名即可)"
          else
            echo "$RELEASE_SHA1"
          fi
          echo ""
          
          echo "======================================"
          echo "📝 如何使用这些信息"
          echo "======================================"
          echo ""
          
          # 保存变量供后续使用
          DEBUG_SHA1=$(keytool -list -v -keystore $HOME/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep "SHA1:" | sed 's/.*SHA1: //')
          
          echo "【Google Maps API Key 配置】"
          echo "1. 访问: https://console.cloud.google.com/apis/credentials"
          echo "2. 创建凭据 → API 密钥"
          echo "3. 限制密钥 → 选择「Android 应用」"
          echo "4. 添加包名称和指纹:"
          echo "   - 包名称: $PACKAGE_NAME"
          echo "   - SHA-1 证书指纹: $DEBUG_SHA1"
          echo "5. 保存后复制 API Key"
          echo ""
          echo "【高德地图 API Key 配置】"
          echo "1. 访问: https://console.amap.com/dev/key/app"
          echo "2. 创建新应用 → 添加 Key"
          echo "3. 服务平台选择「Android 平台」"
          echo "4. 填写信息:"
          echo "   - PackageName: $PACKAGE_NAME"
          echo "   - 发布版安全码 SHA1: $DEBUG_SHA1"
          echo "5. 提交后复制 Key"
          echo ""
          echo "【配置到 GitHub Secrets】"
          echo "访问: https://github.com/${{ github.repository }}/settings/secrets/actions"
          echo ""
          echo "在 Environment 'Android Build' 中添加:"
          echo "  - MAPS_API_KEY = <你的Google Maps API Key>"
          echo "  - AMAP_API_KEY = <你的高德地图API Key>"
          echo ""
          echo "======================================"
          
          # 将信息保存到文件
          cat > api-key-info.txt << EOF
======================================
API Key 配置信息
======================================

📦 包名 (Package Name):
$PACKAGE_NAME

🔐 Debug SHA1 指纹:
$DEBUG_SHA1

🔐 Debug SHA256 指纹:
$(keytool -list -v -keystore $HOME/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep "SHA256:" | sed 's/.*SHA256: //')

======================================
Google Maps API Key 配置步骤
======================================

1. 访问: https://console.cloud.google.com/apis/credentials
2. 创建凭据 → API 密钥
3. 限制密钥 → Android 应用
4. 添加:
   包名称: $PACKAGE_NAME
   SHA-1 指纹: $DEBUG_SHA1
5. 保存并复制 API Key

======================================
高德地图 API Key 配置步骤
======================================

1. 访问: https://console.amap.com/dev/key/app
2. 创建应用 → 添加 Key → Android 平台
3. 填写:
   PackageName: $PACKAGE_NAME
   SHA1: $DEBUG_SHA1
4. 提交并复制 Key

======================================
配置到 GitHub Repository Secrets
======================================

访问: https://github.com/${{ github.repository }}/settings/environments

创建 Environment: Android Build
添加以下 Secrets:
  - MAPS_API_KEY = <你的Google Maps API Key>
  - AMAP_API_KEY = <你的高德地图API Key>

======================================
EOF
          
          echo ""
          echo "✅ 配置信息已保存到 api-key-info.txt"
      
      - name: 生成完整签名报告文件
        run: |
          ./gradlew signingReport --no-daemon > signing-report.txt 2>&1
          echo "完整的签名报告已保存到 signing-report.txt"
      
      - name: 上传配置信息文件
        uses: actions/upload-artifact@v4
        with:
          name: api-key-configuration-info
          path: |
            api-key-info.txt
            signing-report.txt
          retention-days: 7
      
      - name: 显示完成信息
        run: |
          echo ""
          echo "======================================"
          echo "✅ 完成！"
          echo "======================================"
          echo ""
          echo "📥 配置信息已上传为 Artifact"
          echo "   在本页面顶部可下载 'api-key-configuration-info'"
          echo ""
          echo "📋 下一步操作:"
          echo "1. ⬆️  向上滚动查看完整的 SHA1 指纹和包名"
          echo "2. 📥 或下载 Artifact 中的 api-key-info.txt 文件"
          echo "3. 🔑 按照说明到 Google/高德平台申请 API Key"
          echo "4. 🔐 将 API Key 添加到 GitHub Secrets"
          echo "5. 🚀 推送代码，GitHub Actions 会自动构建"
          echo ""

